function buildTables() {
  const g = document.getElementById('l-tables');
  g.innerHTML = '';
  for (const num in TABLES) {
    const [x, y] = TABLES[num];
    const gr = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', x); c.setAttribute('cy', y); c.setAttribute('r', 11);
    c.setAttribute('fill', '#efeeea'); c.setAttribute('stroke', '#c2c2bc');
    c.setAttribute('stroke-width', '0.9');
    gr.appendChild(c);
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', x); t.setAttribute('y', y + 3);
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('font-family', 'var(--f)');
    t.setAttribute('font-size', '7'); t.setAttribute('fill', '#9a948a');
    t.textContent = num;
    gr.appendChild(t);
    gr.addEventListener('mouseenter', e => showTip(e, 'Table ' + num));
    gr.addEventListener('mouseleave', hideTip);
    g.appendChild(gr);
  }
}

function pos(d) {
  if (d.x !== undefined && d.y !== undefined) return {x: d.x, y: d.y};
  const t = TABLES[d.table];
  if (!t) return {x: 550, y: 360};
  const xOff = d.xOff || 0;
  const yOff = d.yOff || 0;
  return {x: t[0] + xOff, y: t[1] + yOff};
}

function color(d) {
  // Admin/Congress = blue, head table POTUS/VP = red
  if (d.table === 'head') return '#8c1c1c';
  return '#1a3356';
}

function drawAnnotations() {
  const g = document.getElementById('l-annot');
  g.innerHTML = '';
  DIG.forEach(d => {
    const {x, y} = pos(d);
    const col = color(d);
    const gr = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    gr.setAttribute('class', 'a-dot');
    const h = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    h.setAttribute('cx', x); h.setAttribute('cy', y); h.setAttribute('r', 9);
    h.setAttribute('fill', col); h.setAttribute('opacity', '0.18');
    gr.appendChild(h);
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('class', 'a-core');
    c.setAttribute('cx', x); c.setAttribute('cy', y); c.setAttribute('r', 5.5);
    c.setAttribute('fill', col); c.setAttribute('stroke', '#fff'); c.setAttribute('stroke-width', '1.5');
    gr.appendChild(c);
    gr.addEventListener('mouseenter', e => showTip(e, d.name));
    gr.addEventListener('mouseleave', hideTip);
    gr.addEventListener('click', e => { e.stopPropagation(); openPanel(d); });
    g.appendChild(gr);
  });
}

function openPanel(d) {
  document.getElementById('pn').textContent = d.name;
  document.getElementById('rl').textContent = d.role;
  document.getElementById('cp').textContent = d.caption;
  const im = document.getElementById('pi'); im.innerHTML = '';
  const keys = d.pk || [];
  if (!keys.length) {
    const p = document.createElement('div');
    p.style.cssText = 'width:200px;height:140px;border-radius:3px;border:1px solid #e2e2de;background:#f4f4f2;display:flex;align-items:center;justify-content:center;font-size:9px;color:#a0a098;flex-shrink:0';
    p.textContent = 'No photos attached'; im.appendChild(p);
  } else {
    keys.forEach((k, i) => {
      const src = (typeof PHOTOS !== 'undefined') ? PHOTOS[k] : null;
      const w = document.createElement('div'); w.className = 'pw';
      if (src) { const ig = document.createElement('img'); ig.className = 'pm'; ig.src = src; w.appendChild(ig); }
      else { const p = document.createElement('div'); p.style.cssText = 'width:200px;height:140px;border-radius:3px;border:1px solid #e2e2de;background:#f4f4f2;display:flex;align-items:center;justify-content:center;font-size:9px;color:#a0a098;flex-shrink:0'; p.textContent = k; w.appendChild(p); }
      const cr = document.createElement('div'); cr.className = 'pc';
      cr.textContent = (d.cr && d.cr[i]) || 'Getty Images';
      w.appendChild(cr); im.appendChild(w);
    });
  }
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}
function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
}

let sc = 1, tx = 0, ty = 0, dr = false, lx = 0, ly = 0;
document.getElementById('cw').addEventListener('mousedown', e => {
  if (e.target.closest('.a-dot')) return;
  dr = true; lx = e.clientX; ly = e.clientY;
  document.getElementById('cw').classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dr) return;
  tx += e.clientX - lx; ty += e.clientY - ly; lx = e.clientX; ly = e.clientY; aT();
});
window.addEventListener('mouseup', () => { dr = false; document.getElementById('cw').classList.remove('dragging'); });
document.getElementById('cw').addEventListener('wheel', e => {
  e.preventDefault();
  sc = Math.min(6, Math.max(0.3, sc * (e.deltaY < 0 ? 1.1 : 0.909))); aT();
}, {passive: false});
function aT() {
  document.querySelector('svg').style.transform = `translate(${tx}px,${ty}px) scale(${sc})`;
  document.querySelector('svg').style.transformOrigin = '0 0';
  document.getElementById('zl').textContent = Math.round(sc*100) + '%';
}
function resetV() { sc = 1; tx = 0; ty = 0; document.querySelector('svg').style.transform = ''; document.getElementById('zl').textContent = '100%'; }
function zs(f) { sc = Math.min(6, Math.max(0.3, sc*f)); aT(); }

const te = document.getElementById('tip');
function showTip(e, t) { te.textContent = t; te.classList.add('on'); mt(e); }
function hideTip() { te.classList.remove('on'); }
document.addEventListener('mousemove', mt);
function mt(e) {
  let x = e.clientX + 12, y = e.clientY + 12;
  if (x + 220 > window.innerWidth) x = e.clientX - 224;
  if (y + 34 > window.innerHeight) y = e.clientY - 38;
  te.style.left = x + 'px'; te.style.top = y + 'px';
}

buildTables();
drawAnnotations();
</script>
