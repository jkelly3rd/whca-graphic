<title>Where top officials were seated at WHCA Dinner 2026</title>
<style>
@import url('https://use.typekit.net/zgr5ked.css');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ebe9e2;--surface:#fff;--border:#d4d2cc;--border2:#b4b4ac;
  --ink:#15150f;--ink2:#3e3e38;--ink3:#86867e;
  --red:#8c1c1c;--blue:#1a3356;--gold:#b89000;
  --f:'tt-norms-pro','TT Norms Pro',-apple-system,'Inter',sans-serif;
}
body{font-family:var(--f);background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{padding:11px 22px 9px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;}
.h-title{font-size:19px;font-weight:600;letter-spacing:-0.005em;}
.h-sub{font-size:11px;color:var(--ink3);margin-top:3px;letter-spacing:0.05em;text-transform:uppercase;}
.h-r{display:flex;align-items:center;gap:5px;}
.btn{font-family:var(--f);font-size:9px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border2);background:transparent;color:var(--ink2);cursor:pointer;border-radius:3px;}
.btn:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
.zlbl{font-size:9px;color:var(--ink3);min-width:36px;text-align:right;}
.cw{flex:1;overflow:hidden;position:relative;cursor:grab;background:var(--bg);}
.cw.dragging{cursor:grabbing;}
svg{display:block;width:100%;height:100%;}
.legend{padding:7px 22px;border-top:1px solid var(--border);display:flex;gap:18px;align-items:center;background:var(--surface);flex-shrink:0;}
.li{display:flex;align-items:center;gap:6px;font-size:9.5px;color:var(--ink2);}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
#overlay{position:fixed;inset:0;background:rgba(15,15,14,0.32);z-index:190;opacity:0;pointer-events:none;transition:opacity 0.15s;}
#overlay.open{opacity:1;pointer-events:all;}
#panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.96);background:var(--surface);border:1px solid var(--border2);box-shadow:0 20px 56px rgba(0,0,0,0.16);width:480px;max-width:92vw;max-height:92vh;overflow-y:auto;border-radius:5px;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.15s,transform 0.15s;}
#panel.open{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1);}
.ph{padding:13px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--surface);}
.pn{font-size:16px;font-weight:600;}
.pr{font-size:9px;color:var(--ink3);margin-top:3px;letter-spacing:0.05em;text-transform:uppercase;}
.px{background:none;border:none;cursor:pointer;font-size:19px;color:var(--ink3);line-height:1;padding:0;margin-top:-2px;}
.px:hover{color:var(--ink);}
.pi{display:flex;gap:8px;padding:11px 16px;overflow-x:auto;scrollbar-width:thin;}
.pw{flex-shrink:0;}
.pm{display:block;width:200px;height:140px;object-fit:cover;border-radius:3px;border:1px solid var(--border);}
.pc{font-size:7.5px;color:var(--ink3);margin-top:3px;}
.pt{padding:9px 16px 13px;font-size:9.5px;color:var(--ink2);line-height:1.65;border-top:1px solid var(--border);}
.guests{padding:0 16px 10px;font-size:9.5px;color:var(--ink2);line-height:1.55;}
.guests-label{font-size:8.5px;color:var(--ink3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px;}
#tip{position:fixed;background:rgba(26,26,24,0.92);color:#fff;font-family:var(--f);font-size:9.5px;padding:5px 9px;border-radius:3px;pointer-events:none;opacity:0;transition:opacity 0.08s;z-index:300;white-space:nowrap;}
#tip.on{opacity:1;}
.a-dot{cursor:pointer;}.a-core{transition:r 0.12s;}.a-dot:hover .a-core{r:7 !important;}
</style>
</head>

function drawAnnotations() {
  const g = document.getElementById('l-annot');
  g.innerHTML = '';
  DIG.forEach(d => {
    const grp = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    grp.setAttribute('class', 'a-dot');
    const halo = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    halo.setAttribute('cx', d.px); halo.setAttribute('cy', d.py); halo.setAttribute('r', 11);
    halo.setAttribute('fill', d.color); halo.setAttribute('opacity', '0.22');
    grp.appendChild(halo);
    const core = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    core.setAttribute('class', 'a-core');
    core.setAttribute('cx', d.px); core.setAttribute('cy', d.py); core.setAttribute('r', 5.5);
    core.setAttribute('fill', d.color); core.setAttribute('stroke', '#fff'); core.setAttribute('stroke-width', '1.6');
    grp.appendChild(core);
    grp.addEventListener('mouseenter', e => showTip(e, d.name));
    grp.addEventListener('mouseleave', hideTip);
    grp.addEventListener('click', e => { e.stopPropagation(); openPanel(d); });
    g.appendChild(grp);
  });
}

function openPanel(d) {
  document.getElementById('pn').textContent = d.name;
  document.getElementById('rl').textContent = d.role;
  document.getElementById('cp').textContent = d.caption;
  const piWrap = document.getElementById('pi-wrap');
  const im = document.getElementById('pi');
  im.innerHTML = '';
  const keys = d.pk || [];
  if (!keys.length) {
    piWrap.style.display = 'none';
  } else {
    piWrap.style.display = '';
    keys.forEach((k, i) => {
      const src = (typeof PHOTOS !== 'undefined') ? PHOTOS[k] : null;
      if (!src) return;
      const w = document.createElement('div'); w.className = 'pw';
      const ig = document.createElement('img'); ig.className = 'pm'; ig.src = src;
      w.appendChild(ig);
      const cr = document.createElement('div'); cr.className = 'pc';
      cr.textContent = (d.cr && d.cr[i]) || 'Getty Images';
      w.appendChild(cr);
      im.appendChild(w);
    });
    if (im.children.length === 0) piWrap.style.display = 'none';
  }
  const gWrap = document.getElementById('guests-wrap');
  const gList = document.getElementById('guests-list');
  if (d.guests && d.guests.length) {
    gList.innerHTML = '';
    d.guests.forEach((g, i) => {
      if (i > 0) gList.appendChild(document.createTextNode(' · '));
      gList.appendChild(document.createTextNode(g));
    });
    gWrap.style.display = '';
  } else {
    gWrap.style.display = 'none';
  }
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}
function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
}

let sc=1,tx=0,ty=0,dr=false,lx=0,ly=0;
document.getElementById('cw').addEventListener('mousedown',e=>{if(e.target.closest('.a-dot'))return;dr=true;lx=e.clientX;ly=e.clientY;document.getElementById('cw').classList.add('dragging');});
window.addEventListener('mousemove',e=>{if(!dr)return;tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;aT();});
window.addEventListener('mouseup',()=>{dr=false;document.getElementById('cw').classList.remove('dragging');});
document.getElementById('cw').addEventListener('wheel',e=>{e.preventDefault();sc=Math.min(6,Math.max(0.3,sc*(e.deltaY<0?1.1:0.909)));aT();},{passive:false});
function aT(){document.querySelector('svg').style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;document.querySelector('svg').style.transformOrigin='0 0';document.getElementById('zl').textContent=Math.round(sc*100)+'%';}
function resetV(){sc=1;tx=0;ty=0;document.querySelector('svg').style.transform='';document.getElementById('zl').textContent='100%';}
function zs(f){sc=Math.min(6,Math.max(0.3,sc*f));aT();}

const te=document.getElementById('tip');
function showTip(e,t){te.textContent=t;te.classList.add('on');mt(e);}
function hideTip(){te.classList.remove('on');}
document.addEventListener('mousemove',mt);
function mt(e){let x=e.clientX+12,y=e.clientY+12;if(x+220>window.innerWidth)x=e.clientX-224;if(y+34>window.innerHeight)y=e.clientY-38;te.style.left=x+'px';te.style.top=y+'px';}

drawAnnotations();
</script>
