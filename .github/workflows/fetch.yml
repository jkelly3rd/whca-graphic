name: Scheduled Data Fetch

# Runs on a schedule and can also be triggered manually.
# Fetches fresh data, commits any changes, and optionally re-runs notebooks.
#
# To activate: uncomment the `schedule` block and adjust the cron expression.
# Cron syntax: minute hour day-of-month month day-of-week
#   '0 6 * * *'    → every day at 6am UTC
#   '0 6 * * 1-5'  → weekdays at 6am UTC
#   '0 */6 * * *'  → every 6 hours

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 6 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Set up Python
      run: uv python install 3.13

    - name: Install dependencies
      run: uv sync
      # Add extras if your fetch script needs them, e.g.:
      # run: uv sync --extra scraping

    - name: Fetch data
      env:
        # Map GitHub Actions secrets to environment variables your script expects.
        # Add secrets at: repo → Settings → Secrets and variables → Actions
        DATA_API_KEY: ${{ secrets.DATA_API_KEY }}
        # DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        uv run python scripts/fetch.py
        # Or run a notebook directly:
        # uv run jupyter nbconvert --to notebook --execute --allow-errors --inplace notebooks/00_fetch.ipynb

    - name: Commit updated data
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add data/raw/
        # Only commit if there are actual changes
        git diff --cached --quiet || git commit -m "chore: refresh data [$(date -u +%Y-%m-%d)]"
        git push
